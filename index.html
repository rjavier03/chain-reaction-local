<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Chain Reaction P2P</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0e14; --surface: #161a24; --border: #2e334d;
      --text: #e8eaf6; --accent: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Screens */
    .screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--surface); padding: 2rem; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    h1 { font-family: 'Fredoka One', cursive; color: var(--accent); margin-bottom: 1rem; font-size: 2rem; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: #0b0e14; color: white; font-size: 1rem; }
    button { background: var(--accent); border: none; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Game Header */
    header { height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 2px solid var(--border); }
    .turn-bar { padding: 8px 20px; border-radius: 30px; font-weight: 900; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

    /* Grid Logic */
    #game-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #grid { display: grid; gap: 4px; background: var(--border); padding: 4px; border-radius: 10px; }
    .cell { background: var(--bg); width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border-radius: 4px; transition: background 0.2s; }
    .cell:hover { background: #1a1e2e; }

    /* Atom Visuals */
    .atom-container { position: relative; width: 100%; height: 100%; pointer-events: none; }
    .atom { position: absolute; width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4); top: 50%; left: 50%; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    
    /* Atom Layout Positions */
    .count-1 .a1 { transform: translate(-50%, -50%); }
    .count-2 .a1 { transform: translate(-90%, -50%); }
    .count-2 .a2 { transform: translate(10%, -50%); }
    .count-3 .a1 { transform: translate(-50%, -100%); }
    .count-3 .a2 { transform: translate(-100%, 0%); }
    .count-3 .a3 { transform: translate(0%, 0%); }

    .critical { animation: orbit 1.5s infinite linear; }
    @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #player-list { margin: 15px 0; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
    .p-item { display: flex; align-items: center; gap: 10px; margin: 5px 0; font-weight: bold; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
  </style>
</head>
<body>

  <div id="setup-screen" class="screen">
    <div class="card" id="lobby-ui">
      <h1>CHAIN REACTION</h1>
      <input type="text" id="user-name" placeholder="Your Name">
      
      <div id="host-controls">
        <div style="display:flex; gap:10px">
          <div style="flex:1">
            <label style="font-size:0.8rem">Grid Size</label>
            <select id="grid-size">
              <option value="6x9">6x9 (Small)</option>
              <option value="8x12" selected>8x12 (Med)</option>
              <option value="10x15">10x15 (Large)</option>
            </select>
          </div>
          <div style="flex:1">
            <label style="font-size:0.8rem">Players</label>
            <select id="max-players">
              <option value="2">2 Players</option>
              <option value="3">3 Players</option>
              <option value="4" selected>4 Players</option>
              <option value="6">6 Players</option>
              <option value="8">8 Players</option>
            </select>
          </div>
        </div>
        <button onclick="startHosting()">Create Room</button>
      </div>

      <div style="margin: 15px 0; opacity: 0.5;">— OR —</div>
      
      <input type="text" id="room-id-input" placeholder="Paste Room ID">
      <button style="background:var(--surface); border:1px solid var(--accent)" onclick="joinRoom()">Join Game</button>
    </div>

    <div class="card" id="waiting-ui" style="display:none">
      <h1>Lobby</h1>
      <p style="font-size:0.8rem; opacity:0.7">Room ID (Click to Copy):</p>
      <h2 id="display-id" onclick="copyID()" style="cursor:pointer; color:var(--accent); margin:10px 0; letter-spacing:2px">----</h2>
      <div id="player-list"></div>
      <button id="start-btn" disabled onclick="hostInitGame()">Start Game</button>
    </div>
  </div>

  <header>
    <div id="info">Players: <span id="p-count">0</span></div>
    <div id="turn-ui" class="turn-bar">Waiting...</div>
    <button onclick="location.reload()" style="width:auto; padding:5px 15px; font-size:0.7rem">Leave</button>
  </header>

  <div id="game-area">
    <div id="grid"></div>
  </div>

  <script>
    const COLORS = ['#ff4d4d', '#4d96ff', '#6bcb77', '#ffd93d', '#c77dff', '#ff9f43', '#0fbcf9', '#ef5777'];
    const G = {
      peer: null, connections: [], conn: null,
      isHost: false, myId: null, myName: "",
      players: [], // {id, name, colorIdx, isActive, firstMoveDone}
      grid: [], rows: 0, cols: 0,
      currentTurn: 0, gameStarted: false, isExploding: false
    };

    // --- RTC LOGIC ---

    function startHosting() {
      G.myName = document.getElementById('user-name').value || "Host";
      G.isHost = true;
      G.peer = new Peer();
      G.peer.on('open', id => {
        G.myId = id;
        G.players.push({ id, name: G.myName, colorIdx: 0, isActive: true, firstMoveDone: false });
        showLobby(id);
      });
      G.peer.on('connection', c => {
        c.on('open', () => {
          c.on('data', data => handleData(data, c));
        });
      });
    }

    function joinRoom() {
      const target = document.getElementById('room-id-input').value.trim();
      if(!target) return;
      G.myName = document.getElementById('user-name').value || "Guest";
      G.peer = new Peer();
      G.peer.on('open', id => {
        G.myId = id;
        G.conn = G.peer.connect(target);
        G.conn.on('open', () => {
          G.conn.send({ type: 'join', name: G.myName });
          showLobby(target);
        });
        G.conn.on('data', handleData);
      });
    }

    function handleData(data, c) {
      if (data.type === 'join' && G.isHost) {
        const limit = parseInt(document.getElementById('max-players').value);
        if (G.players.length >= limit) return;
        const p = { id: c.peer, name: data.name, colorIdx: G.players.length, isActive: true, firstMoveDone: false };
        G.players.push(p);
        G.connections.push(c);
        broadcast({ type: 'sync-lobby', players: G.players });
        updateLobbyUI();
      }
      if (data.type === 'sync-lobby') {
        G.players = data.players;
        updateLobbyUI();
      }
      if (data.type === 'start-game') {
        G.players = data.players;
        setupGrid(data.rows, data.cols);
        G.gameStarted = true;
        document.getElementById('setup-screen').style.display = 'none';
        updateTurnUI();
      }
      if (data.type === 'move') {
        executeMove(data.r, data.c, data.pIdx);
      }
    }

    function broadcast(msg) {
      G.connections.forEach(c => c.send(msg));
    }

    // --- GAME LOGIC ---

    function setupGrid(r, c) {
      G.rows = r; G.cols = c;
      const gridEl = document.getElementById('grid');
      gridEl.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
      gridEl.innerHTML = "";
      G.grid = [];

      for (let i = 0; i < r; i++) {
        G.grid[i] = [];
        for (let j = 0; j < c; j++) {
          let cap = 4;
          if ((i === 0 || i === r-1) && (j === 0 || j === c-1)) cap = 2;
          else if (i === 0 || i === r-1 || j === 0 || j === c-1) cap = 3;

          G.grid[i][j] = { owner: -1, count: 0, cap: cap };
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `c-${i}-${j}`;
          cell.onclick = () => playerClick(i, j);
          gridEl.appendChild(cell);
        }
      }
    }

    function playerClick(r, c) {
      if (G.isExploding || !G.gameStarted) return;
      const myIdx = G.players.findIndex(p => p.id === G.myId);
      if (G.currentTurn !== myIdx) return;

      const cell = G.grid[r][c];
      if (cell.owner !== -1 && cell.owner !== myIdx) return;

      const move = { type: 'move', r, c, pIdx: myIdx };
      if (G.isHost) {
        executeMove(r, c, myIdx);
        broadcast(move);
      } else {
        G.conn.send(move);
      }
    }

    async function executeMove(r, c, pIdx) {
      G.isExploding = true;
      G.players[pIdx].firstMoveDone = true;
      await addAtom(r, c, pIdx);
      
      checkEliminations();
      
      // Cycle turn to next active player
      let next = (G.currentTurn + 1) % G.players.length;
      while (!G.players[next].isActive) {
        next = (next + 1) % G.players.length;
      }
      G.currentTurn = next;
      
      updateTurnUI();
      G.isExploding = false;
      checkWin();
    }

    async function addAtom(r, c, pIdx) {
      const cell = G.grid[r][c];
      cell.owner = pIdx;
      cell.count++;

      if (cell.count >= cell.cap) {
        cell.count = 0;
        cell.owner = -1;
        renderCell(r, c);
        
        const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
        let tasks = [];
        for (let [nr, nc] of neighbors) {
          if (nr >=0 && nr < G.rows && nc >=0 && nc < G.cols) {
            tasks.push(addAtom(nr, nc, pIdx));
          }
        }
        await Promise.all(tasks);
      } else {
        renderCell(r, c);
        await new Promise(res => setTimeout(res, 120));
      }
    }

    function renderCell(r, c) {
      const cell = G.grid[r][c];
      const el = document.getElementById(`c-${r}-${c}`);
      el.innerHTML = "";
      if (cell.count === 0) return;

      const container = document.createElement('div');
      container.className = `atom-container count-${cell.count}`;
      if (cell.count === cell.cap - 1) container.classList.add('critical');

      for (let i=0; i<cell.count; i++) {
        const a = document.createElement('div');
        a.className = `atom a${i+1}`;
        a.style.backgroundColor = COLORS[G.players[cell.owner].colorIdx];
        container.appendChild(a);
      }
      el.appendChild(container);
    }

    function checkEliminations() {
      G.players.forEach((p, idx) => {
        if (p.isActive && p.firstMoveDone) {
          const ownsAtoms = G.grid.flat().some(cell => cell.owner === idx);
          if (!ownsAtoms) p.isActive = false;
        }
      });
    }

    function checkWin() {
      const active = G.players.filter(p => p.isActive);
      if (active.length === 1 && G.players.some(p => p.firstMoveDone && !p.isActive)) {
        alert("GAME OVER! " + active[0].name + " WINS!");
        location.reload();
      }
    }

    // --- UI HELPERS ---

    function showLobby(id) {
      document.getElementById('lobby-ui').style.display = 'none';
      document.getElementById('waiting-ui').style.display = 'block';
      document.getElementById('display-id').innerText = id;
      updateLobbyUI();
    }

    function updateLobbyUI() {
      const list = document.getElementById('player-list');
      list.innerHTML = G.players.map(p => `
        <div class="p-item">
          <div class="dot" style="background:${COLORS[p.colorIdx]}"></div>
          ${p.name} ${p.id === G.myId ? '(You)' : ''}
        </div>
      `).join('');
      document.getElementById('p-count').innerText = G.players.length;
      if (G.isHost) document.getElementById('start-btn').disabled = G.players.length < 2;
    }

    function hostInitGame() {
      const [c, r] = document.getElementById('grid-size').value.split('x').map(Number);
      const msg = { type: 'start-game', rows: r, cols: c, players: G.players };
      broadcast(msg);
      handleData(msg);
    }

    function updateTurnUI() {
      const cur = G.players[G.currentTurn];
      const ui = document.getElementById('turn-ui');
      ui.innerText = (cur.id === G.myId) ? "YOUR TURN" : `${cur.name.toUpperCase()}'S TURN`;
      ui.style.backgroundColor = COLORS[cur.colorIdx];
      ui.style.color = (G.currentTurn === 3) ? '#000' : '#fff'; // Dark text for yellow player
    }

    function copyID() {
      navigator.clipboard.writeText(G.myId);
      alert("ID Copied!");
    }
  </script>
</body>
</html>
